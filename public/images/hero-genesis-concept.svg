<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur-light">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="smoke-gradient" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="light-rays" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa00;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:0"/>
    </linearGradient>
    <filter id="volumetric">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="40"/>
    </filter>
  </defs>

  <!-- Dark base -->
  <rect width="1920" height="1080" fill="#0a0a0a"/>

  <!-- Smoke/mist base -->
  <circle cx="960" cy="540" r="800" fill="url(#smoke-gradient)" filter="url(#volumetric)"/>

  <!-- Light ray 1 (main) -->
  <polygon points="600,0 700,1080 900,1080 800,0" fill="url(#light-rays)" opacity="0.6" filter="url(#blur-light)"/>

  <!-- Light ray 2 -->
  <polygon points="800,0 850,1080 1050,1080 1000,0" fill="url(#light-rays)" opacity="0.4" filter="url(#blur-light)"/>

  <!-- Light ray 3 -->
  <polygon points="1000,0 1050,1080 1250,1080 1200,0" fill="url(#light-rays)" opacity="0.35" filter="url(#blur-light)"/>

  <!-- Atmospheric depth layers -->
  <rect width="1920" height="1080" fill="url(#smoke-gradient)" opacity="0.3" filter="url(#glow)"/>

  <!-- God rays effect (volumetric) -->
  <g filter="url(#glow)">
    <ellipse cx="960" cy="300" rx="600" ry="200" fill="#ff6600" opacity="0.15"/>
    <ellipse cx="800" cy="500" rx="500" ry="300" fill="#ff8800" opacity="0.1"/>
  </g>

  <!-- Dust particles in light -->
  <circle cx="700" cy="300" r="3" fill="#ffaa00" opacity="0.7"/>
  <circle cx="750" cy="400" r="2" fill="#ffaa00" opacity="0.5"/>
  <circle cx="800" cy="250" r="2.5" fill="#ffaa00" opacity="0.6"/>
  <circle cx="850" cy="350" r="2" fill="#ffaa00" opacity="0.4"/>
  <circle cx="900" cy="500" r="3" fill="#ffaa00" opacity="0.5"/>
  <circle cx="950" cy="300" r="2" fill="#ffaa00" opacity="0.6"/>
  <circle cx="1000" cy="450" r="2.5" fill="#ffaa00" opacity="0.55"/>

  <!-- Deep shadows in foreground -->
  <rect width="1920" height="400" y="600" fill="#1a1a1a" opacity="0.7"/>

  <!-- Teal shadow accent -->
  <ellipse cx="300" cy="700" rx="400" ry="200" fill="#1a4d5c" opacity="0.3" filter="url(#blur-light)"/>

  <!-- Final overlay for contrast -->
  <rect width="1920" height="1080" fill="#000000" opacity="0.15"/>

  <!-- Text overlay example (optional) -->
  <text x="960" y="540" font-family="Satoshi, sans-serif" font-size="80" fill="#f5f2eb" text-anchor="middle" opacity="0" font-weight="900">
    GENESIS
  </text>
</svg>